version: '3.8'

services:
  voice-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multimodal-voice-assistant
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8000:8000"
      - "8080:8080"
    volumes:
      # Model files (read-only)
      - ./models:/app/models:ro
      # Documents and Vector DB (read-write)
      - ./documents:/app/documents:rw
      - ./vector_db:/app/vector_db:rw
      # Uncomment for local live development
      # - ./backend:/app/backend:ro
      # - ./frontend:/app/frontend:ro
    environment:
      - PYTHONUNBUFFERED=1
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
      - LLM_PROVIDER=local
      - TTS_PROVIDER=kokoro
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    env_file:
      - .env
    restart: unless-stopped
    shm_size: '2gb' # Required for PyTorch DataLoader workers
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"